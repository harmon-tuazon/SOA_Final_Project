# Local dev only. Mirrors the shape of terraform/app/ (one block per service)
# without touching infra — this file is app-engineer owned.
#
# services/_template is the golden-path skeleton for new services (never run
# directly — see services/_template/README.md). Add a block per real service
# here, modeled on the template, once it's scaffolded via /new-service.
services:
  dynamodb-local:
    image: amazon/dynamodb-local
    ports:
      - "8000:8000"
