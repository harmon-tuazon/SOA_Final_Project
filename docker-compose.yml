# Local dev only. Mirrors the shape of terraform/app/ (one block per service)
# without touching infra — this file is app-engineer owned.
#
# services/_template is the golden-path skeleton for new services (never run
# directly — see services/_template/README.md). Add a block per real service
# here, modeled on the template, once it's scaffolded via /new-service.
services:
  dynamodb-local:
    image: amazon/dynamodb-local
    ports:
      - "8000:8000"

  order:
    build: services/order
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      ORDER_TABLE: soa-order
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: us-east-1
      # Dummy local creds — DynamoDB Local does not validate them, but the
      # SDK requires *some* credentials to be present to sign requests.
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      CORS_ALLOWED_ORIGIN: "*"
    depends_on:
      - dynamodb-local
