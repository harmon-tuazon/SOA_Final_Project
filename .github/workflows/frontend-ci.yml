name: Frontend CI

# PR check for the React SPA (PRD frontend/0001). Builds + typechecks only —
# no AWS auth, no deploy. Additive: does not touch the existing required
# "Terraform fmt / validate / plan" check in ci.yml.
on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

jobs:
  build:
    name: Frontend build / typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enforce the no-hardcoded-endpoint rule (service-contract.md): the SPA
      # must read the API base URL from runtime config.json, never a literal
      # ALB DNS baked into source. A hardcoded endpoint would break on the
      # next edge teardown/recreate cycle.
      - name: No hardcoded endpoints
        run: |
          if grep -rInE "elb\.amazonaws\.com" frontend/src; then
            echo "::error::Hardcoded API endpoint found in frontend/src — read it from runtime config.json instead."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
