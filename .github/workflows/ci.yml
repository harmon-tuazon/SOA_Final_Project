name: Infrastructure CI

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: Terraform fmt / validate / plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Catches Dockerfile/build errors on the PR (PRD platform/0004 §7,
      # generalized by platform/0005 §3). No AWS auth, no push — just proves
      # each service's image builds. Iterates every services/<name> dir
      # except the never-deployed _template; with zero services this loop
      # simply runs zero times and the step passes. Context is the repo
      # root, so override the job's default terraform/app working directory
      # for this one step.
      - name: Docker build (every service)
        working-directory: .
        run: |
          set -euo pipefail
          shopt -s nullglob
          for dir in services/*/; do
            name=$(basename "$dir")
            [ "$name" = "_template" ] && continue
            echo "::group::docker build services/$name"
            docker build -t "$name:ci" "services/$name"
            echo "::endgroup::"
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC, read-only plan role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform fmt check (repo-wide)
        working-directory: .
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -lock=false
